<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <main>
      <section
        role="textbox"
        tabindex="0"
        id="textbox-container"
        aria-label="0">
        <div id="textbox"></div>
      </section>
      <section class="numbers-container">
        <button class="del" data-action="C" data-key="c" aria-label="All Clear">
          AC
        </button>
        <button
          class="act"
          data-action="±"
          data-key="±"
          aria-label="Plus or minus">
          ±
        </button>
        <button class="act" data-action="%" data-key="%" aria-label="Percent">
          %
        </button>
        <button class="act" data-action="÷" data-key="/" aria-label="Divide">
          ÷
        </button>
        <button class="num" data-action="7" data-key="7" aria-label="7">
          7
        </button>
        <button class="num" data-action="8" data-key="8" aria-label="8">
          8
        </button>
        <button class="num" data-action="9" data-key="9" aria-label="9">
          9
        </button>
        <button class="act" data-action="×" data-key="*" aria-label="Multiply">
          ×
        </button>
        <button class="num" data-action="4" data-key="4" aria-label="4">
          4
        </button>
        <button class="num" data-action="5" data-key="5" aria-label="5">
          5
        </button>
        <button class="num" data-action="6" data-key="6" aria-label="6">
          6
        </button>
        <button class="act" data-action="-" data-key="-" aria-label="Subtract">
          -
        </button>
        <button class="num" data-action="1" data-key="1" aria-label="1">
          1
        </button>
        <button class="num" data-action="2" data-key="2" aria-label="2">
          2
        </button>
        <button class="num" data-action="3" data-key="3" aria-label="3">
          3
        </button>
        <button class="act" data-action="+" data-key="+" aria-label="Add">
          +
        </button>
        <button
          class="del"
          data-action="b"
          data-key="backspace"
          aria-label="Delete">
          DEL
        </button>
        <button class="num" data-action="0" data-key="0" aria-label="0">
          0
        </button>
        <button class="num" data-action="." data-key="." aria-label="Point">
          .
        </button>
        <button class="equ" data-action="=" data-key="=" aria-label="Equals">
          =
        </button>
      </section>
    </main>
  </body>
  <script type="module" src="dist/index.js"></script>
</html>
