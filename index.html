<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <main>
      <section class="textbox-container">
        <div role="textbox" tabindex="0" id="textbox">999999999999999999</div>
      </section>
      <section class="numbers-container">
        <button class="act" data-action="C">C</button>
        <button class="act" data-action="±">±</button>
        <button class="act" data-action="%">%</button>
        <button class="act" data-action="÷">÷</button>
        <button class="num" data-action="7">7</button>
        <button class="num" data-action="8">8</button>
        <button class="num" data-action="9">9</button>
        <button class="act" data-action="×">×</button>
        <button class="num" data-action="4">4</button>
        <button class="num" data-action="5">5</button>
        <button class="num" data-action="6">6</button>
        <button class="act" data-action="-">-</button>
        <button class="num" data-action="1">1</button>
        <button class="num" data-action="2">2</button>
        <button class="num" data-action="3">3</button>
        <button class="act" data-action="+">+</button>
        <button class="num" data-action="0">0</button>
        <button class="num" data-action=".">.</button>
        <button class="equ" data-action="=">=</button>
      </section>
    </main>
  </body>
  <!-- <script type="module" src="dist/index.js"></script> -->
</html>
