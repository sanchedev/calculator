<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <main>
      <section role="textbox" tabindex="0" id="textbox-container">
        <div id="textbox"></div>
      </section>
      <section class="numbers-container">
        <button class="del" data-action="C" data-key="c">C</button>
        <button class="act" data-action="±" data-key="±">±</button>
        <button class="act" data-action="%" data-key="%">%</button>
        <button class="act" data-action="÷" data-key="/">÷</button>
        <button class="num" data-action="7" data-key="7">7</button>
        <button class="num" data-action="8" data-key="8">8</button>
        <button class="num" data-action="9" data-key="9">9</button>
        <button class="act" data-action="×" data-key="*">×</button>
        <button class="num" data-action="4" data-key="4">4</button>
        <button class="num" data-action="5" data-key="5">5</button>
        <button class="num" data-action="6" data-key="6">6</button>
        <button class="act" data-action="-" data-key="-">-</button>
        <button class="num" data-action="1" data-key="1">1</button>
        <button class="num" data-action="2" data-key="2">2</button>
        <button class="num" data-action="3" data-key="3">3</button>
        <button class="act" data-action="+" data-key="+">+</button>
        <button class="del" data-action="b" data-key="backspace"><</button>
        <button class="num" data-action="0" data-key="0">0</button>
        <button class="num" data-action="." data-key=".">.</button>
        <button class="equ" data-action="=" data-key="=">=</button>
      </section>
    </main>
  </body>
  <script type="module" src="dist/index.js"></script>
</html>
